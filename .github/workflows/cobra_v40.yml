name: "Cobra v4.0 — Daily Engine"

on:
  schedule:
    # Lunes–Viernes a las 22:45 UTC.
    # Busca tener cerrados US + EU y dar tiempo a que el proveedor publique barras diarias estables.
    - cron: "45 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # ⬅️ NECESARIO para poder hacer commit automático

jobs:
  cobra_v40:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      # ---------------------------------------------
      # 1. Checkout del repositorio
      # ---------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------
      # 2. Preparar Python 3.12
      # ---------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ---------------------------------------------
      # 3. Instalar dependencias
      # ---------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------
      # 4. Ejecutar Cobra v4.0
      # ---------------------------------------------
      - name: Run Cobra v4.0 Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "PYTHONPATH ANTES: $PYTHONPATH"
          export PYTHONPATH="$(pwd):$PYTHONPATH"
          echo "PYTHONPATH DESPUÉS: $PYTHONPATH"

          touch data/portfolio_v40.csv
          python -m v40.engine.run_v40

      # ---------------------------------------------
      # 5. Commit automático del estado operativo (si cambia)
      # ---------------------------------------------
      - name: Commit operational state if updated
        run: |
          git config user.name "cobra-monkey-bot"
          git config user.email "cobra-monkey@users.noreply.github.com"

          CHANGED=false

          if git status --porcelain | grep "data/dataset_v40.csv"; then
            echo "📈 Dataset actualizado"
            git add data/dataset_v40.csv
            CHANGED=true
          fi

          if git status --porcelain | grep "data/portfolio_v40.csv"; then
            echo "📦 Portfolio operativo actualizado"
            git add data/portfolio_v40.csv
            CHANGED=true
          fi

          if git status --porcelain | grep "data/daily_candidates.csv"; then
            echo "🎯 Shortlist diaria actualizada"
            git add data/daily_candidates.csv
            CHANGED=true
          fi

          if [ "$CHANGED" = true ]; then
            git commit -m "ops(v40): update dataset and portfolio [auto]" || echo "ℹ️ Nada que commitear finalmente"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "ℹ️ Estado operativo sin cambios → no commit"
          fi

      # ---------------------------------------------
      # 6. Guardar artifacts
      # ---------------------------------------------
      - name: Save Cobra artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobra_v40_artifacts
          path: |
            outputs/logs/
            outputs/daily_prices/
            data/dataset_v40.csv
            data/portfolio_v40.csv
            data/daily_candidates.csv
          retention-days: 7

